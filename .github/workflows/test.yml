---
name: Test
"on":
  push:
    branches: ["main", "dev"]
  pull_request:
    branches: ["main"]
jobs:
  test:
    name: Test on Go ${{ matrix.go-version }}
    permissions:
      checks: write
      contents: read
      pull-requests: read
      statuses: write
    runs-on: ubuntu-24.04-arm
    timeout-minutes: 10
    strategy:
      matrix:
        go-version: ["1.26.0-rc.2", "1.25.6", "1.24.12"]
    env:
      GOTOOLCHAIN: local
    steps:
      - name: ✔ Check out
        uses: actions/checkout@v6.0.2
        with:
          persist-credentials: false
      - name: 🐹 Set up Go ${{ matrix.go-version }}
        uses: actions/setup-go@v6.2.0
        with:
          go-version: ${{ matrix.go-version }}
      - name: 🧸 golangci-lint
        uses: golangci/golangci-lint-action@v9.2.0
        with:
          version: v2.8.0
          args: --config=.golangci-default.yaml
      - name: 🔨 Test
        run: |
          cat <<EOF > .custom-gcl.yaml
          ---
          version: v2.8.0
          plugins:
            - module: fillmore-labs.com/zerolint-golangci-plugin
              path: .
          EOF
          golangci-lint custom -v && ./custom-gcl run -v .
